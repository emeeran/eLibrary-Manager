services:
  elibrary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elibrary_app
    ports:
      - "8000:8000"
    volumes:
      - ./library:/app/library:ro
      - ./dawnstar_data:/app/dawnstar_data
      - ./static_covers:/app/static_covers
      - ./static_book_images:/app/static_book_images
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/dawnstar_data/dawnstar.db
      - LIBRARY_PATH=/app/library
      - COVERS_PATH=/app/static_covers
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Optional: Ollama for local AI summaries
  ollama:
    image: ollama/ollama:latest
    container_name: elibrary_ollama
    profiles:
      - ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  ollama_data:
